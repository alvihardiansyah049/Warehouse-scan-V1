<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <!-- Wajib untuk tampilan responsive di HP -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scan Resi - Warehouse App</title>

  <!-- File CSS untuk styling -->
  <link rel="stylesheet" href="style.css" />

  <!-- Library html5-qrcode untuk scan barcode/QR via kamera HP -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>

  <!-- ======================== HEADER ======================== -->
  <header class="app-header">
    <h1>📦 Warehouse - Scan Resi</h1>
  </header>

  <main class="app-container">

    <!-- ======================== AREA KAMERA SCANNER ======================== -->
    <section class="card camera-card">
      <h2>Area Kamera</h2>
      <!-- Div ini akan otomatis diisi video kamera oleh library html5-qrcode -->
      <div id="reader"></div>

      <!-- Tombol untuk start/stop kamera secara manual jika diperlukan -->
      <div class="camera-controls">
        <button id="btnStart" class="btn btn-primary">Mulai Kamera</button>
        <button id="btnStop" class="btn btn-secondary" disabled>Stop Kamera</button>
      </div>
    </section>

    <!-- ======================== AREA HASIL SCAN ======================== -->
    <section class="card result-card">
      <h2>Hasil Scan</h2>
      <div class="result-box">
        <p class="label">Nomor Resi:</p>
        <p id="resiText" class="resi-value">-</p>
      </div>
      <div class="result-box">
        <p class="label">Waktu Scan:</p>
        <p id="scanTime" class="resi-value">-</p>
      </div>
    </section>

    <!-- ======================== AREA STATUS VALID/DUPLICATE ======================== -->
    <section class="card status-card">
      <h2>Status</h2>
      <!-- Status akan berubah class & teks via JavaScript -->
      <div id="statusBox" class="status-box status-idle">
        Menunggu hasil scan...
      </div>
    </section>

    <!-- ======================== AREA RIWAYAT SCAN (LOKAL) ======================== -->
    <section class="card history-card">
      <h2>Riwayat Scan (Sesi Ini)</h2>
      <ul id="historyList" class="history-list">
        <!-- Item riwayat akan ditambahkan otomatis oleh JavaScript -->
      </ul>
    </section>

  </main>

  <footer class="app-footer">
    <p>Warehouse Scan Prototype</p>
  </footer>

  <!-- File JavaScript utama -->
  <script src="script.js"></script>
</body>
</html>
